    <!-- gate 4 -->
    <g fill="#d64d2a"><rect x="516" y="280" width="11" height="104"/><rect x="673" y="280" width="11" height="104"/><rect x="508" y="278" width="184" height="10"/><rect x="516" y="296" width="168" height="6"/></g>
    <!-- gate 3 -->
