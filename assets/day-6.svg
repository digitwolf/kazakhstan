<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" preserveAspectRatio="xMidYMid slice" role="img">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4a64a8"/>
      <stop offset="0.62" stop-color="#c099a0"/>
      <stop offset="1" stop-color="#f2c8a8"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="500" fill="url(#sky)"/>
  <circle cx="960" cy="132" r="54" fill="#f8d8ad"/>
  <circle cx="960" cy="132" r="76" fill="#f8d8ad" opacity="0.18"/>
  <!-- far ridge behind -->
