    <circle cx="60" cy="470" r="9" fill="#e58aa0"/>
    <circle cx="110" cy="478" r="9" fill="#f0a8b8"/>
    <circle cx="160" cy="470" r="9" fill="#e58aa0"/>
    <circle cx="1040" cy="472" r="9" fill="#f0a8b8"/>
    <circle cx="1090" cy="480" r="9" fill="#e58aa0"/>
    <circle cx="1140" cy="472" r="9" fill="#f0a8b8"/>
