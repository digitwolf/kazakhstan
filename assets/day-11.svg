<svg xmlns="http://www.w3.org/2000/svg" role="img" viewBox="0 0 1200 500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky11" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9fd0cf"/>
      <stop offset="0.55" stop-color="#dfdcc4"/>
      <stop offset="1" stop-color="#f4d39c"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="500" fill="url(#sky11)"/>
  <!-- low sun disc over the Pacific -->
  <circle cx="920" cy="170" r="58" fill="#f7cf90"/>
  <!-- distant green ranges (lightest) -->
  <path d="M0,238 L200,198 L420,240 L640,196 L860,240 L1080,200 L1200,236 L1200,300 L0,300 Z" fill="#8fbb8f"/>
  <!-- mid forest range -->
  <path d="M0,292 L230,250 L460,294 L690,252 L910,294 L1140,256 L1200,284 L1200,360 L0,360 Z" fill="#5fa169"/>
  <!-- Pacific sea band (the coast opens out) -->
  <rect x="0" y="312" width="1200" height="188" fill="#2f8a8f"/>
  <path d="M0,312 L1200,312 L1200,338 L0,338 Z" fill="#46a6a3"/>
  <!-- green valley walls funneling the river forward -->
  <path d="M0,330 L300,300 L470,360 L360,500 L0,500 Z" fill="#2f6f4f"/>
  <path d="M1200,330 L900,300 L740,360 L860,500 L1200,500 Z" fill="#2a663f"/>
  <!-- river ribbon widening down to the sea -->
  <path d="M560,300 L640,300 L700,500 L500,500 Z" fill="#bfe0d4"/>
  <path d="M584,300 L616,300 L660,500 L540,500 Z" fill="#dceee6"/>
  <!-- small Kochi-castle keep on a left hill -->
  <polygon points="190,360 280,360 235,330" fill="#243a30"/>
  <rect x="200" y="360" width="60" height="26" fill="#2c4538"/>
  <polygon points="196,360 264,360 230,346" fill="#1d2f27"/>
  <rect x="222" y="386" width="16" height="14" fill="#2c4538"/>
  <!-- calm sea strokes -->
  <g stroke="#6fc0bc" stroke-width="4" stroke-linecap="round">
    <line x1="120" y1="392" x2="190" y2="392"/>
    <line x1="900" y1="384" x2="980" y2="384"/>
    <line x1="980" y1="440" x2="1070" y2="440"/>
  </g>
</svg>
