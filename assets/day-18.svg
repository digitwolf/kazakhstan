<svg xmlns="http://www.w3.org/2000/svg" role="img" viewBox="0 0 1200 500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky18" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#bfe3e0"/>
      <stop offset="0.55" stop-color="#e3eedd"/>
      <stop offset="1" stop-color="#f4d9a8"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="500" fill="url(#sky18)"/>
  <circle cx="930" cy="170" r="64" fill="#f7e3ad"/>
  <!-- far hills, lightening toward back -->
  <path d="M0,300 Q160,266 360,294 Q520,270 700,296 L700,300 Z" fill="#a9cdb6"/>
  <path d="M600,300 Q820,268 1000,296 Q1100,282 1200,294 L1200,300 Z" fill="#88bb9b"/>
  <!-- port rooftops of the canal quarter (machiya) -->
  <g fill="#4f7d60">
    <polygon points="700,300 770,300 770,268 735,250 700,268"/>
    <polygon points="775,300 845,300 845,260 810,242 775,260"/>
    <polygon points="850,300 920,300 920,266 885,248 850,266"/>
  </g>
  <!-- calm canal water -->
  <rect y="300" width="1200" height="200" fill="#3fb8af"/>
  <rect y="372" width="1200" height="128" fill="#1f6f78"/>
  <!-- quay edges of the canal -->
  <rect y="300" width="1200" height="8" fill="#2f8e88"/>
  <!-- Joyato stone lantern lighthouse hero motif (Tomonoura port) -->
  <g fill="#1f4f38">
    <rect x="332" y="190" width="20" height="110"/>
    <rect x="326" y="178" width="32" height="14"/>
    <polygon points="318,178 366,178 342,150 326,166"/>
    <polygon points="330,150 354,150 342,138"/>
    <rect x="320" y="296" width="44" height="6"/>
  </g>
  <!-- willow tree leaning over the canal -->
  <g stroke="#2f6f4f" stroke-width="3" stroke-linecap="round" fill="none">
    <path d="M150,500 L150,210"/>
    <path d="M150,214 q40,-20 76,-6"/>
    <path d="M150,224 q-44,-18 -84,-2"/>
    <path d="M200,210 q6,40 -2,70"/>
    <path d="M226,212 q10,44 0,84"/>
    <path d="M178,206 q4,50 -4,94"/>
    <path d="M96,214 q-8,40 0,72"/>
    <path d="M70,220 q-10,46 -2,80"/>
  </g>
  <!-- still-water reflection strokes -->
  <path d="M520,344 q40,-7 80,0 t80,0" fill="none" stroke="#7fd0c8" stroke-width="3" stroke-linecap="round"/>
  <path d="M780,358 q40,-7 80,0 t80,0" fill="none" stroke="#7fd0c8" stroke-width="3" stroke-linecap="round"/>
</svg>
