<svg xmlns="http://www.w3.org/2000/svg" role="img" viewBox="0 0 1200 500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky17" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#bfe3e0"/>
      <stop offset="0.55" stop-color="#dff0e3"/>
      <stop offset="1" stop-color="#f4d9a8"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="500" fill="url(#sky17)"/>
  <circle cx="930" cy="170" r="64" fill="#f7e3ad"/>
  <!-- far lemon islands, lightening toward back -->
  <path d="M0,300 Q120,272 250,296 L250,300 Z" fill="#a9cdb6"/>
  <path d="M640,300 Q760,266 900,294 Q1010,276 1200,294 L1200,300 Z" fill="#a9cdb6"/>
  <path d="M300,302 Q430,274 560,300 L560,302 Z" fill="#88bb9b"/>
  <path d="M880,302 Q1010,278 1200,300 L1200,302 Z" fill="#88bb9b"/>
  <!-- calm sea -->
  <rect y="300" width="1200" height="200" fill="#3fb8af"/>
  <rect y="360" width="1200" height="140" fill="#1f6f78"/>
  <!-- gentle sea strokes -->
  <path d="M520,330 q40,-8 80,0 t80,0" fill="none" stroke="#7fd0c8" stroke-width="3" stroke-linecap="round"/>
  <path d="M760,344 q40,-8 80,0 t80,0" fill="none" stroke="#7fd0c8" stroke-width="3" stroke-linecap="round"/>
  <!-- foreground hillside temple town on the left -->
  <path d="M0,500 L0,150 Q150,120 320,210 Q440,272 520,300 L520,500 Z" fill="#2f6f4f"/>
  <!-- ropeway cable + cabin up the hill -->
  <line x1="70" y1="180" x2="470" y2="300" stroke="#1f4f38" stroke-width="2.5"/>
  <rect x="250" y="226" width="26" height="15" rx="3" fill="#1f4f38"/>
  <!-- pagoda hero motif on the hilltop -->
  <g fill="#1f4f38">
    <rect x="78" y="150" width="10" height="20"/>
    <polygon points="60,156 106,156 96,140 70,140"/>
    <rect x="72" y="170" width="22" height="14"/>
    <polygon points="54,176 112,176 98,160 68,160"/>
    <rect x="68" y="184" width="30" height="16"/>
    <polygon points="48,200 118,200 100,182 66,182"/>
  </g>
  <!-- a couple of town rooftops -->
  <g fill="#26543c">
    <polygon points="150,260 200,260 175,242"/>
    <polygon points="210,278 268,278 239,258"/>
  </g>
</svg>
