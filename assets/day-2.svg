  <rect x="612" y="418" width="16" height="40" fill="#c0392b" opacity="0.28"/>
  <path d="M0 432 Q300 422 600 432 T1200 432 L1200 456 L0 456 Z" fill="#2d4877" opacity="0.6"/>
