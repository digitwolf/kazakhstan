<svg xmlns="http://www.w3.org/2000/svg" role="img" viewBox="0 0 1200 500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky9" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#bfe3e0"/>
      <stop offset="0.6" stop-color="#cfe0c0"/>
      <stop offset="1" stop-color="#f4d9a8"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="500" fill="url(#sky9)"/>
  <!-- low sun disc -->
  <circle cx="920" cy="160" r="54" fill="#f6d49a"/>
  <!-- distant misty green ranges (lightest) -->
  <path d="M0,250 L200,212 L420,252 L640,208 L860,250 L1080,210 L1200,244 L1200,320 L0,320 Z" fill="#8fb98f"/>
  <!-- mid forest range -->
  <path d="M0,300 L240,256 L470,302 L700,256 L920,300 L1140,262 L1200,288 L1200,360 L0,360 Z" fill="#5fa06a"/>
  <!-- sea band (Naruto strait) lower-left -->
  <path d="M0,330 L560,330 L470,500 L0,500 Z" fill="#1f6f78"/>
  <!-- whirlpool: concentric arcs -->
  <g fill="none" stroke="#bfe3e0" stroke-width="5" stroke-linecap="round">
    <path d="M260,392 a52,30 0 1 1 -1,0"/>
    <path d="M250,400 a36,21 0 1 0 1,0"/>
    <path d="M240,408 a20,12 0 1 1 -1,0"/>
  </g>
  <circle cx="252" cy="412" r="5" fill="#0f4c52"/>
  <!-- deep green gorge walls (front, dark) opening on the right -->
  <path d="M1200,300 L900,278 L720,360 L640,500 L1200,500 Z" fill="#2f6f4f"/>
  <path d="M560,330 L760,320 L700,420 L660,500 L470,500 Z" fill="#27603f"/>
  <!-- gorge river glint between walls -->
  <path d="M690,360 C672,400 700,430 686,470 L712,470 C724,432 700,402 716,360 Z" fill="#9fc7b0"/>
</svg>
